<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-400 to-indigo-600 flex items-center justify-center p-4">

  <div class="w-full max-w-lg">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8">
      <h1 class="text-3xl font-bold text-center text-gray-800 mb-1">Weather Dashboard</h1>
      <p class="text-center text-gray-500 mb-6">Check current weather in any city</p>

      <form id="weatherForm" class="flex flex-col sm:flex-row gap-2 mb-6">
        <input
          type="text"
          id="cityInput"
          placeholder="Enter city name..."
          class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent transition"
          required
        />
        <button
          type="submit"
          id="submitBtn"
          class="px-6 py-3 bg-sky-500 text-white font-semibold rounded-lg hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:ring-offset-2 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Search
        </button>
        <button
          type="button"
          id="resetBtn"
          class="px-4 py-3 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2 transition"
        >
          Reset
        </button>
      </form>

      <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg p-4 mb-4 text-center"></div>

      <div id="loadingSpinner" class="hidden text-center py-8">
        <div class="inline-block w-8 h-8 border-4 border-sky-200 border-t-sky-500 rounded-full animate-spin"></div>
        <p class="text-gray-500 mt-2 text-sm">Fetching weather...</p>
      </div>

      <div id="results" class="hidden">
        <div class="border-2 border-sky-200 rounded-xl p-6 bg-sky-50">
          <div class="text-center mb-4">
            <h2 id="cityName" class="text-2xl font-bold text-gray-800"></h2>
            <p id="country" class="text-gray-500 text-sm"></p>
          </div>
          <div class="text-center mb-6">
            <span id="weatherIcon" class="text-6xl block"></span>
            <p id="temperature" class="text-5xl font-bold text-gray-800 mt-2"></p>
            <p id="condition" class="text-lg text-gray-600 mt-1"></p>
          </div>
          <div class="grid grid-cols-3 gap-4 text-center">
            <div>
              <p class="text-gray-500 text-xs uppercase tracking-wide">Feels Like</p>
              <p id="feelsLike" class="text-lg font-semibold text-gray-800 mt-1"></p>
            </div>
            <div>
              <p class="text-gray-500 text-xs uppercase tracking-wide">Humidity</p>
              <p id="humidity" class="text-lg font-semibold text-gray-800 mt-1"></p>
            </div>
            <div>
              <p class="text-gray-500 text-xs uppercase tracking-wide">Wind</p>
              <p id="windSpeed" class="text-lg font-semibold text-gray-800 mt-1"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <p class="text-center text-white/70 text-sm mt-4">Powered by Open-Meteo API &middot; No API key required</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
